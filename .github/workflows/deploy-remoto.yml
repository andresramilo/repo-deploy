name: Deploy Remoto
on:
  repository_dispatch:
    types:
      - deploy-remoto
  workflow_call:
    inputs:
      ambiente:
        type: string
        default: "desenvolvimento"
        required: true
        description: "Ambiente onde será feito o deploy"

jobs:
  deploy-kubernetes:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no ambiente
        run: echo "Executando o deploy no ambiente de ${{ inputs.ambiente || github.event.client_payload.ambiente }}"
      - name: Curl Deploy no ambiente
        run: "curl -X POST  https://webhook.site/6ea726d2-c70a-4424-bdf4-a86570810099 -d '{ ambiente : ${{ inputs.ambiente || github.event.client_payload.ambiente }}}'"
